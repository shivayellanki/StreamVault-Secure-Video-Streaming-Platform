services:
  # 1. MySQL Database (Private Service)
  - type: pserv
    name: mysql
    runtime: image
    image:
      url: docker.io/library/mysql:8.0
    disk:
      name: mysql-data
      mountPath: /var/lib/mysql
      sizeGB: 5
    envVars:
      - key: MYSQL_ROOT_PASSWORD
        value: 9392973677shiva
      - key: MYSQL_DATABASE
        value: secure_streaming

  # 2. Express Backend API (Web Service)
  - type: web
    name: backend
    runtime: docker
    dockerfilePath: Dockerfile
    rootDir: backend
    envVars:
      - key: PORT
        value: 8000
      - key: DB_HOST
        value: mysql
      - key: DB_PORT
        value: 3306
      - key: DB_USER
        value: root
      - key: DB_PASSWORD
        value: 9392973677shiva
      - key: DB_NAME
        value: secure_streaming
      # Let Render generate a strong JWT secret automatically
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: shivayellanki08@gmail.com
      - key: ADMIN_PASS
        value: admin1234
      # Sensitive AWS Credentials (prompted during blueprint creation)
      - key: AWS_REGION
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_S3_BUCKET_NAME
        sync: false
      # Frontend URL for CORS (set after frontend deployment)
      - key: FRONTEND_URL
        sync: false

  # 3. React Frontend (Static Site)
  - type: web
    name: frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      # API Base URL for Axios requests (set after backend deployment)
      - key: VITE_API_URL
        sync: false
